<!doctype html>
<html>
    <head>
        <title>Simple Calculator</title>
        <link rel="stylesheet" href="calc.css" />
        <script src="calc.js" defer></script>
    </head>
    <body>
        <div id="calculator">
            <output type="text" id="display">0</output>
            <div id="numpad">
                <button type="button" class="key" id="clear">Clear</button>

                <button type="button" class="key" id="plus">+</button>

                <button type="button" class="key" id="one">1</button>
                <button type="button" class="key" id="two">2</button>
                <button type="button" class="key" id="three">3</button>

                <button type="button" class="key" id="minus">-</button>

                <button type="button" class="key" id="four">4</button>
                <button type="button" class="key" id="five">5</button>
                <button type="button" class="key" id="six">6</button>

                <button type="button" class="key" id="times">*</button>

                <button type="button" class="key" id="seven">7</button>
                <button type="button" class="key" id="eight">8</button>
                <button type="button" class="key" id="nine">9</button>

                <button type="button" class="key" id="over">/</button>

                <button type="button" class="key" id="zero">0</button>

                <button type="button" class="key" id="equals">=</button>
            </div>
        </div>
    </body>
</html>
